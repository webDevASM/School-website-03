    <!-- Preloader Start -->
    <div id="preloader" class="preloader">
        <div class="animation-preloader">
            <div class="spinner">
            </div>
            <div class="txt-loading mb-2">
                <span class="letters-loading">
                    K
                </span>
                <span class="letters-loading">
                    I
                </span>
                <span class="letters-loading">
                    N
                </span>
                <span class="letters-loading">
                    E
                </span>
                <span class="letters-loading">
                    Z
                </span>
            </div>
            <p class="text-center">Loading</p>
        </div>
        <div class="loader">
            <div class="row">
                <div class="col-3 loader-section section-left">
                    <div class="bg"></div>
                </div>
                <div class="col-3 loader-section section-left">
                    <div class="bg"></div>
                </div>
                <div class="col-3 loader-section section-right">
                    <div class="bg"></div>
                </div>
                <div class="col-3 loader-section section-right">
                    <div class="bg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Start Cursor Pointer -->
    <div class="mouse-follower">
        <span class="cursor-outline"></span>
        <span class="cursor-dot"></span>
    </div>
    <!-- End Cursor Pointer -->


    <!-- event Section Start -->
    <section class="comming-soon-section section-padding fix h-100 d-center">
        <div class="container">           
           <div class="">
                <div class="col-lg-12">                    
                    <div class="comming-soon-wrap">
                        <div class="evento-info p-0">
                            <div class="text-center wow fadeInUp" data-wow-delay="0.3s">
                                <img style="width: 120px; height: 80px;" src="assets/img/logo/logo-black.png" alt="img">
                            </div>
                            <div class="fs-24px mb-4 wow fadeInUp" data-wow-delay="0.4s">OUR WEBSITE IS UNDER CONSTRUCTION</div>
                            <h2 class="mb-xl-5 mb-4 wow fadeInUp" data-wow-delay="0.5s">
                                COMING <span class="text-theme">SOON!</span>
                            </h2>
                            <div class="countdown-container mb-48">
                                <div class="time-box d-center">
                                    <div class="box">
                                        <span id="days">00</span>
                                    <p>Days</p>
                                    </div>
                                </div>
                                <div class="separator"></div>
                                <div class="time-box d-center">
                                    <div class="box">
                                        <span id="hours">00</span>
                                    <p>Hours</p>
                                    </div>
                                </div>
                                <div class="separator"></div>
                                <div class="time-box d-center">
                                    <div class="box">
                                        <span id="minutes">00</span>
                                    <p>Minutes</p>
                                    </div>
                                </div>
                                <div class="separator"></div>
                                <div class="time-box d-center">
                                    <div class="box">
                                        <span id="seconds">00</span>
                                    <p>Seconds</p>
                                    </div>
                                </div>
                            </div>
                            <form action="#" class="from-style1 mb-4 wow fadeInDown">
                                <input type="email" placeholder="Enter your email...">
                                <button type="button" class="common_btn text-nowrap">
                                    SUBSCRIBE NOW
                                    <span class="icon_wrapper">
                                        <i class="fas fa-long-arrow-alt-right"></i>
                                    </span>
                                </button>
                            </form>
                            <div class="header-top-social justify-content-center d-flex align-items-center">
                                <a href="javascript:void(0)" class="fw-semibold text-dark">
                                    Follow On:
                                </a>
                                <a href="javascript:void(0)" class="icon sub-font"><i class="fa-brands fa-linkedin"></i></a>
                                <a href="javascript:void(0)" class="icon sub-font"><i class="fa-brands fa-twitter"></i> </a>
                                <a href="javascript:void(0)" class="icon sub-font"><i class="fa-brands fa-instagram"></i> </a>
                                <a href="javascript:void(0)" class="icon sub-font"><i class="fa-brands fa-facebook"></i> </a>
                            </div>
                        </div>
                    </div>
                </div>
           </div>
        </div>        
    </section>
